name: Check Search Console

# Manual trigger only, this never runs on a schedule and never touches
# the blog publishing pipeline. Trigger it from the Actions tab in
# GitHub whenever you want to see current Search Console numbers in
# the log.
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Search Console check
        env:
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
        run: node scripts/check-search-console.js
