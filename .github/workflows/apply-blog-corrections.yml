name: Apply blog corrections (patches live Sanity docs)

# Manual trigger ONLY. This is the step that actually changes live
# content, read corrections-review/ on GitHub first, this workflow
# assumes that review has already happened.
on:
  workflow_dispatch: {}

permissions:
  contents: read # this workflow doesn't write anything back to the repo

jobs:
  apply-corrections:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Apply reviewed corrections to live docs
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
        run: node scripts/blog-corrections-apply.js
