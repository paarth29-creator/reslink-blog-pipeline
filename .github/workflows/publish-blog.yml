name: Publish blog post

on:
  schedule:
    # GitHub Actions cron is always UTC. These three times are
    # 10:00 AM, 12:00 PM (noon), and 3:00 PM IST.
    - cron: "30 4 * * *" # 10:00 AM IST
    - cron: "30 6 * * *" # 12:00 PM IST
    - cron: "30 9 * * *" # 3:00 PM IST
  workflow_dispatch: {} # lets you click "Run workflow" manually to test

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # raised from 10, the retry/backoff logic added since this was first set can genuinely take longer on a bad run
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run the pipeline
        run: npm run publish
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }} # optional override, defaults to gpt-oss-120b:free in code
          OPENROUTER_FALLBACK_MODEL: ${{ secrets.OPENROUTER_FALLBACK_MODEL }} # optional override, defaults to llama-3.3-70b-instruct:free in code
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }} # optional, Jina Reader works without a key at this volume
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          SANITY_DOCUMENT_TYPE: ${{ secrets.SANITY_DOCUMENT_TYPE }} # optional override
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }} # optional
