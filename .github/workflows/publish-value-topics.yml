name: Publish value-topic blog post

# Manual trigger ONLY, no cron. Same isolation pattern as
# check-search-console.yml: this file has no schedule trigger at all, so
# it can never fire on its own and can never collide with publish-blog.yml's
# 3x/day schedule. Run it from the Actions tab when you want to publish
# the next topic from the list.
on:
  workflow_dispatch: {}

permissions:
  contents: write # needed to commit the updated tracker file back to the repo

jobs:
  publish-value-topic:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run the value-topic pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          OPENROUTER_FALLBACK_MODEL: ${{ secrets.OPENROUTER_FALLBACK_MODEL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          SANITY_DOCUMENT_TYPE: ${{ secrets.SANITY_DOCUMENT_TYPE }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/value-topic-orchestrator.js

      - name: Commit tracker update
        if: always() # commit even if the run above failed partway, in case the tracker changed before the failure
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/value-topics-published.json
          git diff --staged --quiet || git commit -m "Update value-topic tracker"
          git diff --staged --quiet || git push
