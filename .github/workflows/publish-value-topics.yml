name: Publish value-topic blog post

# 8x/day schedule, requested times converted from IST to UTC (IST is
# UTC+5:30, cron always runs in UTC regardless of server location):
#   03:00 IST -> 21:30 UTC (previous day)   09:00 IST -> 03:30 UTC
#   05:00 IST -> 23:30 UTC (previous day)   11:00 IST -> 05:30 UTC
#   14:00 IST -> 08:30 UTC                  15:00 IST -> 09:30 UTC
#   17:00 IST -> 11:30 UTC                  19:00 IST -> 13:30 UTC
# GitHub's own cron scheduler can run a few minutes late under load, same
# documented behavior as publish-blog.yml's schedule, not a bug here either.
# workflow_dispatch stays available alongside the schedule for manual runs.
on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 21 * * *" # 3:00 AM IST
    - cron: "30 23 * * *" # 5:00 AM IST
    - cron: "30 3 * * *"  # 9:00 AM IST
    - cron: "30 5 * * *"  # 11:00 AM IST
    - cron: "30 8 * * *"  # 2:00 PM IST
    - cron: "30 9 * * *"  # 3:00 PM IST
    - cron: "30 11 * * *" # 5:00 PM IST
    - cron: "30 13 * * *" # 7:00 PM IST

permissions:
  contents: write # needed to commit the updated tracker file back to the repo

# Real bug found in production: a manual trigger and a scheduled trigger
# started ~14 minutes apart, well within a single run's ~6 minute
# duration, and nothing stopped them running at the same time. Both read
# the tracker before either had written back its own update, both picked
# the same "next" topic, both published it independently, a real
# duplicate live post as a result. This group ensures only one run of
# this workflow executes at a time; a second trigger queues and waits for
# the first to fully finish (including its tracker commit) rather than
# running in parallel. cancel-in-progress: false because a queued run
# should still happen, not be thrown away, it'll just correctly see the
# updated tracker and move to the next topic once its turn comes.
concurrency:
  group: publish-value-topic
  cancel-in-progress: false

jobs:
  publish-value-topic:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run the value-topic pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          OPENROUTER_FALLBACK_MODEL: ${{ secrets.OPENROUTER_FALLBACK_MODEL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          SANITY_DOCUMENT_TYPE: ${{ secrets.SANITY_DOCUMENT_TYPE }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/value-topic-orchestrator.js

      - name: Commit tracker update
        if: always() # commit even if the run above failed partway, in case the tracker changed before the failure
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f data/value-topics-published.json ]; then
            git add data/value-topics-published.json
            if ! git diff --staged --quiet; then
              git commit -m "Update value-topic tracker"
              git push
            else
              echo "Tracker file present but unchanged, nothing to commit."
            fi
          else
            echo "Tracker file doesn't exist on this run (expected if the pipeline failed before publishing anything). Nothing to commit, not an error."
          fi
